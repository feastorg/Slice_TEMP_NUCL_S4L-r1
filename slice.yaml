schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-temp-nucl-s4l-r1"
name: "Slice Template — Nucleo32, Small, 4-Layer, Rev 1"
status: "released"
category: "template"

summary: "Starter template for BREAD slices using STM32 Nucleo32 on a small 4-layer PCB (70x100mm)."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "1.0.0"
  firmware: null
  manifest: "0.1.0"

