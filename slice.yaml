  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nucleo32"
    primary: "STM32L432KC"
    supported:
      - "STM32L432KC"
  primary_ic: null
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 4
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

